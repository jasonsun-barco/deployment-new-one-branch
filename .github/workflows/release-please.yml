name: Release Please (DISABLED - Use multi-branch-release.yml instead)

# This workflow is disabled. Use multi-branch-release.yml for all branches.
on:
  workflow_dispatch:  # Only manual trigger
    inputs:
      dummy:
        description: 'This workflow is disabled'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: windows-latest
    steps:
      # - name: Release Please on develop
      #   uses: googleapis/release-please-action@v4
      #   with:
      #     release-type: node
      #     token: ${{ secrets.MY_RELESE_PLEASE_TOKEN }}
      #     target-branch: develop
      - name: Check if PR is merged and from release-please
        id: check-pr
        if: github.event.pull_request.merged == true
        uses: actions/github-script@v6
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            console.log(`PR Title: ${prTitle}`);
            const prAuthor = context.payload.pull_request.user.login;
            console.log(`PR Author: ${prAuthor}`);
            const prHead = context.payload.pull_request.head.ref;
            console.log(`PR Head: ${prHead}`);
            const isReleasePlease = prHead.startsWith('release-please')
            core.setOutput('is-release-please', isReleasePlease);
            
      - name: Handle release-please merge
        if: steps.check-pr.outputs.is-release-please == 'true'
        run: |
          echo "RELEASE TO QA"

          
      - name: Handle regular merge
        if: steps.check-pr.outputs.is-release-please == 'false'
        run: |
          echo "RELEASE TO DEV"

      - name: Release Please on develop
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.MY_RELESE_PLEASE_TOKEN }}
          target-branch: develop


