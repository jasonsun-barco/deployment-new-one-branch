name: Multi-Branch Release Please

on:
  push:
    branches: 
      - main
      - develop
      - beta
      - alpha
  pull_request:
    types: [closed]
    branches: 
      - main
      - develop
      - beta
      - alpha

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release configuration
        id: config
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          echo "Branch: $BRANCH_NAME"
          
          case $BRANCH_NAME in
            main)
              echo "config-file=release-please-config.json" >> $GITHUB_OUTPUT
              echo "release-type=stable" >> $GITHUB_OUTPUT
              ;;
            develop)
              echo "config-file=release-please-config.json" >> $GITHUB_OUTPUT
              echo "release-type=rc" >> $GITHUB_OUTPUT
              ;;
            beta)
              echo "config-file=release-please-beta.json" >> $GITHUB_OUTPUT
              echo "release-type=beta" >> $GITHUB_OUTPUT
              ;;
            alpha)
              echo "config-file=release-please-alpha.json" >> $GITHUB_OUTPUT
              echo "release-type=alpha" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "config-file=release-please-config.json" >> $GITHUB_OUTPUT
              echo "release-type=default" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Check if PR is merged and from release-please
        id: check-pr
        if: github.event.pull_request.merged == true
        uses: actions/github-script@v6
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            console.log(`PR Title: ${prTitle}`);
            const prAuthor = context.payload.pull_request.user.login;
            console.log(`PR Author: ${prAuthor}`);
            const prHead = context.payload.pull_request.head.ref;
            console.log(`PR Head: ${prHead}`);
            const isReleasePlease = prHead.startsWith('release-please')
            core.setOutput('is-release-please', isReleasePlease);
            
      - name: Handle release-please merge
        if: steps.check-pr.outputs.is-release-please == 'true'
        run: |
          echo "Release type: ${{ steps.config.outputs.release-type }}"
          case "${{ steps.config.outputs.release-type }}" in
            stable)
              echo "RELEASE TO PRODUCTION"
              ;;
            rc)
              echo "RELEASE TO QA"
              ;;
            beta)
              echo "RELEASE TO BETA TESTING"
              ;;
            alpha)
              echo "RELEASE TO ALPHA TESTING"
              ;;
          esac

      - name: Handle regular merge
        if: steps.check-pr.outputs.is-release-please == 'false'
        run: |
          echo "Regular merge detected"
          case "${{ github.ref_name }}" in
            main)
              echo "DEPLOY TO STAGING"
              ;;
            develop)
              echo "DEPLOY TO DEV"
              ;;
            beta)
              echo "DEPLOY TO BETA ENV"
              ;;
            alpha)
              echo "DEPLOY TO ALPHA ENV"
              ;;
          esac

      - name: Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          token: ${{ secrets.MY_RELESE_PLEASE_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ steps.config.outputs.config-file }}
